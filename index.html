<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen RT Digital</title>
  <meta name="description" content="Sistem Informasi Pengelolaan Data Warga dan Iuran RT">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--primary-50:#f0f9ff;--primary-100:#e0f2fe;--primary-200:#bae6fd;--primary-300:#7dd3fc;--primary-400:#38bdf8;--primary-500:#0ea5e9;--primary-600:#0284c7;--primary-700:#0369a1;--primary-800:#075985;--primary-900:#0c4a6e;--bg-main:#f8fafc;--text-primary:#1e293b;--text-secondary:#64748b;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1);--radius-xl:24px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg-main);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .landing{max-width:800px;width:100%;text-align:center}
    .logo{width:120px;height:120px;background:linear-gradient(135deg,var(--primary-600),var(--primary-800));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;box-shadow:var(--shadow-lg)}
    .logo i{font-size:50px;color:#fff}
    h1{font-size:2rem;font-weight:700;color:var(--primary-900);margin-bottom:10px}
    .subtitle{color:var(--text-secondary);font-size:1.1rem;margin-bottom:50px}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:var(--radius-xl);padding:40px 30px;cursor:pointer;transition:all .3s ease;text-decoration:none;color:inherit;display:block}
    .card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:var(--primary-300)}
    .card-icon{width:70px;height:70px;background:var(--primary-50);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
    .card-icon i{font-size:30px;color:var(--primary-600)}
    .card.admin .card-icon{background:var(--primary-100)}.card.admin .card-icon i{color:var(--primary-700)}
    .card.warga .card-icon{background:#dbeafe}.card.warga .card-icon i{color:#2563eb}
    .card h3{font-size:1.3rem;margin-bottom:8px}
    .card p{color:var(--text-secondary);font-size:.9rem}
    .footer{margin-top:60px;color:var(--text-secondary);font-size:.85rem}
    .footer a{color:var(--primary-600);text-decoration:none}
    @media(max-width:600px){h1{font-size:1.5rem}.cards{grid-template-columns:1fr}.card{padding:30px 20px}}
  </style>
</head>
<body>
  <div class="landing">
    <div class="logo"><i class="fas fa-home"></i></div>
    <h1>Manajemen RT Digital</h1>
    <p class="subtitle">Sistem Informasi Pengelolaan Data Warga dan Iuran RT</p>
    
    <div class="cards">
      <a href="admin.html" class="card admin">
        <div class="card-icon"><i class="fas fa-user-shield"></i></div>
        <h3>Panel Admin</h3>
        <p>Kelola data warga, input iuran, dan laporan lengkap untuk pengurus RT</p>
      </a>
      <a href="warga.html" class="card warga">
        <div class="card-icon"><i class="fas fa-users"></i></div>
        <h3>Portal Warga</h3>
        <p>Lihat data keluarga, tagihan iuran, dan update data dengan token</p>
      </a>
    </div>
    
    <div class="footer">
      <p>© 2026 Manajemen RT Digital • <a href="https://github.com/username/manajemen-rt" target="_blank">Source Code</a></p>
    </div>
  </div>
  
  <script>
    // Auto-redirect jika ada parameter ?role=admin atau ?role=warga
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role');
    if (role === 'admin') { window.location.replace('admin.html'); }
    else if (role === 'warga') { window.location.replace('warga.html'); }
  </script>
</body>
</html>
